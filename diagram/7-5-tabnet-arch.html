<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>TabNet 아키텍처</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background: #fff;
            padding: 30px;
            display: flex;
            justify-content: center;
        }
        .container { width: 700px; }
        .architecture {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        .box {
            padding: 12px 30px;
            border: 2px solid #333;
            border-radius: 6px;
            text-align: center;
            font-size: 13px;
            background: #fff;
        }
        .box-dark {
            background: #333;
            color: #fff;
        }
        .box-dashed {
            border-style: dashed;
        }
        .arrow {
            font-size: 20px;
            color: #333;
        }
        .step-container {
            display: flex;
            gap: 20px;
        }
        .step {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding: 15px;
            border: 1px solid #999;
            border-radius: 8px;
            background: #fafafa;
            width: 200px;
        }
        .step-title {
            font-size: 12px;
            font-weight: bold;
            color: #333;
        }
        .step-box {
            padding: 8px 15px;
            border: 1px solid #666;
            border-radius: 4px;
            font-size: 11px;
            background: #fff;
            width: 160px;
            text-align: center;
        }
        .mini-arrow {
            font-size: 14px;
            color: #666;
        }
        .note {
            font-size: 10px;
            color: #666;
            margin-top: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="architecture">
            <div class="box">입력 특성 (x₁, x₂, ..., xₙ)</div>

            <div class="arrow">↓</div>

            <div class="step-container">
                <div class="step">
                    <div class="step-title">Step 1</div>
                    <div class="step-box">Attentive Transformer</div>
                    <div class="mini-arrow">↓</div>
                    <div class="step-box">Sparsemax (마스크)</div>
                    <div class="mini-arrow">↓</div>
                    <div class="step-box">Feature Transformer</div>
                </div>
                <div class="step">
                    <div class="step-title">Step 2</div>
                    <div class="step-box">Attentive Transformer</div>
                    <div class="mini-arrow">↓</div>
                    <div class="step-box">Sparsemax (마스크)</div>
                    <div class="mini-arrow">↓</div>
                    <div class="step-box">Feature Transformer</div>
                </div>
                <div class="step">
                    <div class="step-title">Step N</div>
                    <div class="step-box">Attentive Transformer</div>
                    <div class="mini-arrow">↓</div>
                    <div class="step-box">Sparsemax (마스크)</div>
                    <div class="mini-arrow">↓</div>
                    <div class="step-box">Feature Transformer</div>
                </div>
            </div>

            <div class="arrow">↓</div>

            <div class="box">출력 집계 (Sum)</div>

            <div class="arrow">↓</div>

            <div class="box box-dark">최종 예측</div>

            <div class="note">
                Sparsemax: 중요하지 않은 특성에 정확히 0 부여 → 명시적 특성 선택
            </div>
        </div>
    </div>
</body>
</html>
