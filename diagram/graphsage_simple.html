<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GraphSAGE 동작 원리 (단순 흑백)</title>
    <style>
        body {
            margin: 0;
            padding: 40px;
            background-color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .canvas {
            width: 850px;
            height: 550px;
            border: 2px solid black;
            position: relative;
            background: white;
            overflow: hidden;
        }

        .title {
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            margin-top: 15px;
            text-decoration: underline;
        }

        /* Nodes */
        .node {
            width: 40px;
            height: 40px;
            border: 1px solid black;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 12px;
            position: absolute;
            background: white;
        }

        /* Highlighted (Sampled) Nodes */
        .sampled {
            border: 2.5px solid black;
            font-weight: bold;
            background: #f0f0f0;
        }

        /* Unsampled Nodes */
        .unsampled {
            border: 1px dashed #ccc;
            color: #ccc;
        }

        /* Target Node */
        .node-u {
            width: 60px;
            height: 60px;
            left: 700px;
            top: 220px;
            font-size: 18px;
            border: 2px solid black;
            font-weight: bold;
        }

        /* Boxes */
        .box {
            position: absolute;
            border: 2px solid black;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-size: 13px;
            background: white;
        }

        .agg-box { left: 280px; top: 180px; width: 120px; height: 150px; }
        .concat-box { left: 480px; top: 210px; width: 100px; height: 80px; }

        /* SVG Arrows */
        svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .arrow { fill: none; stroke: black; stroke-width: 1.5; }
        .arrow-head { fill: black; }

        /* Legend / Process labels */
        .step-label {
            position: absolute;
            font-size: 12px;
            font-weight: bold;
            background: white;
            padding: 2px 5px;
            border: 1px solid black;
        }

        .formula { font-family: monospace; font-size: 11px; margin-top: 3px; }

    </style>
</head>
<body>

<div class="canvas">
    <div class="title">GraphSAGE: Sample & Aggregate</div>

    <!-- Neighbor Nodes (Some sampled, some not) -->
    <div class="node unsampled" style="left: 50px; top: 80px;">v₁</div>
    <div class="node sampled" style="left: 80px; top: 150px;">v₂</div>
    <div class="node unsampled" style="left: 40px; top: 210px;">v₃</div>
    <div class="node sampled" style="left: 90px; top: 280px;">v₄</div>
    <div class="node unsampled" style="left: 60px; top: 350px;">v₅</div>
    <div class="node sampled" style="left: 100px; top: 420px;">v₆</div>

    <!-- Boxes -->
    <div class="box agg-box">
        <div style="font-weight: bold;">[AGG]</div>
        <div style="font-size: 10px;">(Mean/Pool/LSTM)</div>
        <div class="formula">h<sub>N(u)</sub></div>
    </div>

    <div class="box concat-box">
        <div style="font-weight: bold;">CONCAT [||]</div>
        <div style="font-size: 10px;">& MLP layer</div>
    </div>

    <div class="node node-u">u</div>

    <!-- Self feature input -->
    <div style="position: absolute; left: 430px; top: 350px; text-align: center;">
        <div style="font-weight: bold;">h<sub>u</sub><sup>(k-1)</sup></div>
        <div style="font-size: 10px;">(Self Info)</div>
    </div>

    <!-- SVG Connections -->
    <svg>
        <defs>
            <marker id="arrowhead" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
                <polygon points="0 0, 6 3, 0 6" fill="black" />
            </marker>
        </defs>
        
        <!-- From Sampled neighbors to AGG -->
        <path d="M 120,170 L 280,220" class="arrow" marker-end="url(#arrowhead)" />
        <path d="M 130,300 L 280,250" class="arrow" marker-end="url(#arrowhead)" />
        <path d="M 140,430 L 280,280" class="arrow" marker-end="url(#arrowhead)" />

        <!-- From AGG to Concat -->
        <path d="M 400,250 L 480,250" class="arrow" marker-end="url(#arrowhead)" />

        <!-- From Self to Concat -->
        <path d="M 460,340 L 510,290" class="arrow" marker-end="url(#arrowhead)" />

        <!-- From Concat to u -->
        <path d="M 580,250 L 700,250" class="arrow" marker-end="url(#arrowhead)" />
    </svg>

    <!-- Labels for Stages -->
    <div class="step-label" style="left: 60px; top: 40px;">1. 이웃 샘플링 (Sampling)</div>
    <div class="step-label" style="left: 280px; top: 140px;">2. 집계 (Aggregate)</div>
    <div class="step-label" style="left: 480px; top: 170px;">3. 결합 (Concatenate & MLP)</div>
    <div class="step-label" style="left: 700px; top: 180px;">4. 갱신 (Update)</div>

</div>

</body>
</html>
