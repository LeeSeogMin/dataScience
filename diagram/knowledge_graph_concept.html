<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지식 그래프 개념 (단순 흑백)</title>
    <style>
        body {
            margin: 0;
            padding: 40px;
            background-color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .canvas {
            width: 800px;
            height: 500px;
            border: 2px solid black;
            position: relative;
            background: white;
            overflow: hidden;
        }

        .title {
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            margin-top: 20px;
            text-decoration: underline;
        }

        /* Nodes (Entities) */
        .node {
            padding: 10px 15px;
            border: 2px solid black;
            border-radius: 20px;
            position: absolute;
            background: white;
            font-weight: bold;
            font-size: 14px;
            text-align: center;
            box-shadow: 2px 2px 0px black;
        }

        /* SVG for relations */
        svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .edge { fill: none; stroke: black; stroke-width: 1.5; }
        
        .rel-label {
            position: absolute;
            font-size: 11px;
            font-weight: bold;
            background: white;
            padding: 2px 5px;
            border: 1px solid black;
            transform: translate(-50%, -50%);
        }

        .legend {
            position: absolute;
            bottom: 20px;
            left: 20px;
            border: 1px solid black;
            padding: 10px;
            font-size: 12px;
        }

        .triple-info {
            position: absolute;
            top: 80px;
            right: 40px;
            border: 1px dashed black;
            padding: 10px;
            font-size: 12px;
            background: #fafafa;
        }

    </style>
</head>
<body>

<div class="canvas">
    <div class="title">지식 그래프 (Knowledge Graph) 구조</div>

    <!-- Triple Structure Legend -->
    <div class="triple-info">
        <b>트리플 (Triple) 구조:</b><br>
        (Head, Relation, Tail)
    </div>

    <!-- Entity Nodes -->
    <div class="node" style="left: 310px; top: 200px; width: 120px;">알베르트 아인슈타인</div>
    <div class="node" style="left: 100px; top: 100px; width: 80px;">독일</div>
    <div class="node" style="left: 550px; top: 150px; width: 100px;">상대성 이론</div>
    <div class="node" style="left: 580px; top: 350px; width: 80px;">물리학</div>
    <div class="node" style="left: 150px; top: 380px; width: 80px;">울름</div>

    <!-- Relations (Edges) -->
    <svg>
        <defs>
            <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
                <path d="M0,0 L8,4 L0,8 Z" fill="black" />
            </marker>
        </defs>
        <!-- Einstein -> Germany -->
        <path d="M 310,210 L 180,130" class="edge" marker-end="url(#arrow)" />
        <!-- Einstein -> Relativity -->
        <path d="M 430,225 L 550,185" class="edge" marker-end="url(#arrow)" />
        <!-- Relativity -> Physics -->
        <path d="M 605,200 L 620,350" class="edge" marker-end="url(#arrow)" />
        <!-- Einstein -> Ulm -->
        <path d="M 330,250 L 220,380" class="edge" marker-end="url(#arrow)" />
        <!-- Ulm -> Germany -->
        <path d="M 190,380 L 145,150" class="edge" marker-end="url(#arrow)" />
    </svg>

    <!-- Relation Labels -->
    <div class="rel-label" style="left: 230px; top: 160px;">출생지</div>
    <div class="rel-label" style="left: 490px; top: 195px;">개발</div>
    <div class="rel-label" style="left: 625px; top: 275px;">분야</div>
    <div class="rel-label" style="left: 265px; top: 325px;">태어난 곳</div>
    <div class="rel-label" style="left: 155px; top: 275px;">위치함</div>

    <div class="legend">
        <b>구성 요소:</b><br>
        • 엔티티 (Entity): 노드 (원/사각형)<br>
        • 관계 (Relation): 엣지 (화살표)
    </div>
</div>

</body>
</html>
