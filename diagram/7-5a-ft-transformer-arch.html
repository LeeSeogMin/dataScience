<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>FT-Transformer 아키텍처</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background: #fff;
            padding: 30px;
            display: flex;
            justify-content: center;
        }
        .container { width: 500px; }
        .architecture {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        .box {
            padding: 12px 30px;
            border: 2px solid #333;
            border-radius: 6px;
            text-align: center;
            font-size: 13px;
            background: #fff;
        }
        .box-dark {
            background: #333;
            color: #fff;
        }
        .arrow {
            font-size: 20px;
            color: #333;
        }
        .token-row {
            display: flex;
            gap: 8px;
        }
        .token {
            padding: 10px 12px;
            border: 1px solid #666;
            border-radius: 4px;
            font-size: 11px;
            background: #f5f5f5;
        }
        .token-cls {
            background: #ddd;
            font-weight: bold;
        }
        .transformer-block {
            padding: 20px 40px;
            border: 2px solid #333;
            border-radius: 8px;
            text-align: center;
        }
        .transformer-block .title {
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .transformer-block .sub {
            font-size: 11px;
            color: #666;
        }
        .note {
            font-size: 10px;
            color: #666;
            margin-top: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="architecture">
            <div class="box">입력 특성 (수치형 + 범주형)</div>

            <div class="arrow">↓</div>

            <div class="box">Feature Tokenizer (각 특성 → d차원 벡터)</div>

            <div class="arrow">↓</div>

            <div class="token-row">
                <div class="token token-cls">[CLS]</div>
                <div class="token">x₁</div>
                <div class="token">x₂</div>
                <div class="token">...</div>
                <div class="token">xₙ</div>
            </div>

            <div class="arrow">↓</div>

            <div class="transformer-block">
                <div class="title">Transformer Encoder × L</div>
                <div class="sub">Multi-Head Self-Attention + FFN</div>
            </div>

            <div class="arrow">↓</div>

            <div class="box">[CLS] 출력 벡터</div>

            <div class="arrow">↓</div>

            <div class="box box-dark">최종 예측</div>

            <div class="note">
                [CLS]: 모든 특성 정보 집약 / Self-Attention: 특성 간 상호작용 학습
            </div>
        </div>
    </div>
</body>
</html>
