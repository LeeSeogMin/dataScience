<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>추천을 위한 이분 그래프 구성 (단순 흑백)</title>
    <style>
        body {
            margin: 0;
            padding: 40px;
            background-color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .canvas {
            width: 800px;
            height: 500px;
            border: 2px solid black;
            position: relative;
            background: white;
            overflow: hidden;
        }

        .title {
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            margin-top: 15px;
            text-decoration: underline;
        }

        /* Node groups */
        .node-group-label {
            position: absolute;
            font-weight: bold;
            font-size: 16px;
            text-transform: uppercase;
        }

        /* Nodes */
        .node {
            width: 45px;
            height: 45px;
            border: 2px solid black;
            border-radius: 5px; /* Square for items, circle for users */
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 12px;
            position: absolute;
            background: white;
            font-weight: bold;
        }

        .user-node { border-radius: 50%; }
        .item-node { border-radius: 0; }

        /* SVG for edges */
        svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .edge { fill: none; stroke: black; stroke-width: 1.5; }

        .legend {
            position: absolute;
            bottom: 20px;
            right: 20px;
            border: 1px solid black;
            padding: 10px;
            font-size: 12px;
            background: white;
        }

        .note {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 13px;
            font-style: italic;
        }

    </style>
</head>
<body>

<div class="canvas">
    <div class="title">사용자-아이템 이분 그래프 (Bipartite Graph)</div>

    <div class="node-group-label" style="left: 140px; top: 80px;">Users (U)</div>
    <div class="node-group-label" style="left: 580px; top: 80px;">Items (I)</div>

    <!-- User Nodes -->
    <div class="node user-node" style="left: 150px; top: 130px;">U1</div>
    <div class="node user-node" style="left: 150px; top: 210px;">U2</div>
    <div class="node user-node" style="left: 150px; top: 290px;">U3</div>
    <div class="node user-node" style="left: 150px; top: 370px;">U4</div>

    <!-- Item Nodes -->
    <div class="node item-node" style="left: 600px; top: 130px;">I1</div>
    <div class="node item-node" style="left: 600px; top: 210px;">I2</div>
    <div class="node item-node" style="left: 600px; top: 290px;">I3</div>
    <div class="node item-node" style="left: 600px; top: 370px;">I4</div>

    <!-- SVG Edges -->
    <svg>
        <!-- U1 interactions -->
        <line x1="195" y1="152.5" x2="600" y2="152.5" class="edge" />
        <line x1="195" y1="152.5" x2="600" y2="232.5" class="edge" />
        
        <!-- U2 interactions -->
        <line x1="195" y1="232.5" x2="600" y2="232.5" class="edge" />
        <line x1="195" y1="232.5" x2="600" y2="312.5" class="edge" />

        <!-- U3 interactions -->
        <line x1="195" y1="312.5" x2="600" y2="152.5" class="edge" />
        <line x1="195" y1="312.5" x2="600" y2="392.5" class="edge" />

        <!-- U4 interactions -->
        <line x1="195" y1="392.5" x2="600" y2="312.5" class="edge" />
    </svg>

    <div class="note">
        * 동일 그룹 내 노드 간 연결 없음 (No User-User, No Item-Item edges)
    </div>

    <div class="legend">
        <b>Symbol:</b><br>
        ○ : User Node<br>
        □ : Item Node<br>
        — : Interaction (Edge)
    </div>
</div>

</body>
</html>
