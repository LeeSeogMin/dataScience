<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAE 반사실 분석 워크플로우</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --border: #c4b5fd;
            --text: #1e293b;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
            background-color: #ffffff;
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1400px;
        }

        h1 {
            text-align: center;
            font-size: 18px;
            margin-bottom: 30px;
            color: var(--text);
            font-weight: 700;
        }

        .main-flow {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .section {
            border-radius: 16px;
            padding: 20px 15px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            min-height: 280px;
            justify-content: center;
        }

        .section-label {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 2px 12px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text);
            border-radius: 4px;
            white-space: nowrap;
        }

        .input-section {
            background: #fefce8;
            border: 2px solid #fde047;
        }

        .encoder-section {
            background: #fef9c3;
            border: 2px solid #facc15;
        }

        .latent-section {
            background: #ecfccb;
            border: 2px solid #a3e635;
        }

        .decoder-section {
            background: #e0e7ff;
            border: 2px solid var(--border);
        }

        .output-section {
            background: #fce7f3;
            border: 2px solid #f9a8d4;
        }

        .box {
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 500;
            text-align: center;
            border: 2px solid var(--border);
            background: white;
            min-width: 100px;
        }

        .box-data {
            border-radius: 8px 8px 16px 16px;
            background: linear-gradient(180deg, #e0e7ff 0%, white 30%);
        }

        .box-layer {
            background: #ddd6fe;
            border-color: #a78bfa;
        }

        .box-param {
            background: #ede9fe;
            border-color: #c4b5fd;
            font-size: 11px;
        }

        .box-reparam {
            background: #c7d2fe;
            border-color: #818cf8;
        }

        .box-latent {
            background: #d9f99d;
            border-color: #84cc16;
        }

        .box-do {
            background: #fef08a;
            border-color: #eab308;
            font-weight: 700;
        }

        .box-modified {
            background: #bef264;
            border-color: #65a30d;
        }

        .box-output {
            background: #fbcfe8;
            border-color: #ec4899;
        }

        .box-result {
            background: white;
            border-color: #f472b6;
        }

        .arrow {
            font-size: 24px;
            color: var(--text-muted);
        }

        .arrow-down {
            font-size: 18px;
            color: var(--text-muted);
        }

        .vertical-flow {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .horizontal-split {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .small-text {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .formula {
            font-family: 'Times New Roman', serif;
            font-style: italic;
            font-size: 11px;
        }

        .bracket {
            font-size: 40px;
            color: var(--text-muted);
            font-weight: 100;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>그림 8-2: VAE 반사실 분석 워크플로우</h1>

    <div class="main-flow">

        <!-- 입력 -->
        <div class="section input-section">
            <span class="section-label">입력</span>
            <div class="box box-data">
                실제 데이터 x<br>
                <span class="small-text">(정책 미수혜자)</span>
            </div>
        </div>

        <span class="arrow">→</span>

        <!-- Encoder -->
        <div class="section encoder-section">
            <span class="section-label">Encoder</span>
            <div class="vertical-flow">
                <div class="box box-layer">FC Layers</div>
                <span class="arrow-down">↓</span>
                <div class="horizontal-split">
                    <div class="box box-param">μ (평균)</div>
                    <div class="box box-param">log σ²</div>
                </div>
                <span class="arrow-down">↓</span>
                <div class="box box-reparam">
                    재매개변수화<br>
                    <span class="formula">z = μ + σ × ε</span>
                </div>
            </div>
        </div>

        <span class="arrow">→</span>

        <!-- 잠재공간 -->
        <div class="section latent-section">
            <span class="section-label">잠재공간</span>
            <div class="vertical-flow">
                <div class="box box-latent">
                    <span class="formula">z = (z₁, z₂, ..., zₙ)</span>
                </div>
                <span class="arrow-down">↓</span>
                <div class="box box-do">
                    do-operator<br>
                    <span class="small-text">z_treatment ← 개입값</span>
                </div>
                <span class="arrow-down">↓</span>
                <div class="box box-modified">
                    <span class="formula">z' = (z₁, ..., z'_t, ..., zₙ)</span>
                </div>
            </div>
        </div>

        <span class="arrow">→</span>

        <!-- Decoder -->
        <div class="section decoder-section">
            <span class="section-label">Decoder</span>
            <div class="vertical-flow">
                <div class="box box-layer">FC Layers</div>
                <span class="arrow-down">↓</span>
                <div class="horizontal-split">
                    <div class="box box-output">x̂ (재구성)</div>
                    <div class="box box-output">x' (반사실)</div>
                </div>
            </div>
        </div>

        <span class="arrow">→</span>

        <!-- 출력 -->
        <div class="section output-section">
            <span class="section-label">출력</span>
            <div class="vertical-flow">
                <div class="box box-result">
                    재구성 데이터
                </div>
                <div style="height: 20px;"></div>
                <div class="box box-result">
                    반사실 데이터<br>
                    <span class="small-text">(만약 정책을 받았다면)</span>
                </div>
            </div>
        </div>

    </div>
</div>

</body>
</html>
